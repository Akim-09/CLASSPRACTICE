<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - JubaSoftHouse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">JubaSoftHouse</div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="signup.html">Sign Up</a></li>
                <li><a href="login.html" class="active">Login</a></li>
            </ul>
            <button class="dark-mode-toggle" id="darkModeBtn">🌙 Dark Mode</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <section class="page-header">
            <h1>Sign In</h1>
            <p>Access your account and get started</p>
        </section>

        <section class="auth-section">
            <div class="auth-container">
                <h2>Login</h2>
                <form class="auth-form">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" name="password" required>
                    </div>
                    <div class="form-group checkbox">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">Remember me</label>
                    </div>
                    <button type="submit" class="btn-submit">Sign In</button>
                </form>
                <p class="auth-link">Don't have an account? <a href="signup.html">Sign up here</a></p>
                <p class="auth-link"><a href="#">Forgot your password?</a></p>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 JubaSoftHouse. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
